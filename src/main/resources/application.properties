server.port=${PORT:8080}

# --- BASE DE DATOS ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

# --- STRIPE ---
stripe.api.key=${STRIPE_API_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
stripe.price.starter.setup=${STRIPE_PRICE_STARTER_SETUP}
stripe.price.starter.monthly=${STRIPE_PRICE_STARTER_MONTHLY}
stripe.price.growth.setup=${STRIPE_PRICE_GROWTH_SETUP}
stripe.price.growth.monthly=${STRIPE_PRICE_GROWTH_MONTHLY}

# --- META CAPI ---
meta.pixel.id=${META_PIXEL_ID}
meta.access.token=${META_ACCESS_TOKEN}

# --- GOOGLE ADS ---
google.ads.clientId=${GOOGLE_ADS_CLIENT_ID}
google.ads.clientSecret=${GOOGLE_ADS_CLIENT_SECRET}
google.ads.refreshToken=${GOOGLE_ADS_REFRESH_TOKEN}
google.ads.developerToken=${GOOGLE_ADS_DEVELOPER_TOKEN}
google.ads.loginCustomerId=${GOOGLE_ADS_LOGIN_CUSTOMER_ID}
google.ads.customerId=${GOOGLE_ADS_CUSTOMER_ID}
google.ads.conversionActionId=${GOOGLE_ADS_CONVERSION_ACTION_ID}

# --- PIPEDRIVE ---
pipedrive.api.token=${PIPEDRIVE_API_TOKEN}
pipedrive.domain=${PIPEDRIVE_DOMAIN}